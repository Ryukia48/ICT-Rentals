<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT-RENTALS - Cart</title>
    <style>
        :root {
            --border-color: #d0d0d0;
            --bg-light: #f9f9f9;
            --accent-red: #ff4d4d;
            --btn-gray: #e8e8e8;
            --text-main: #333;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Navigation Bar --- */
        nav {
            display: flex;
            align-items: center;
            padding: 0 40px;
            background-color: white;
            border-bottom: 1px solid var(--border-color);
            height: 70px;
        }
        .logo { height: 45px; margin-right: 50px; }
        .nav-links { display: flex; list-style: none; margin: 0; padding: 0; flex-grow: 1; gap: 45px; }
        .nav-links li { font-size: 18px; cursor: pointer; color: #333; }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .profile-icon { width: 40px; height: 40px; background: #eee; border-radius: 50%; border: 1px solid #ddd; }

        /* --- Main Content --- */
        .content-wrapper {
            flex-grow: 1;
            padding: 20px 8%;
            position: relative;
            padding-bottom: 100px; /* Space for sticky footer */
        }

        .back-circle {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 20px;
            color: #ccc;
        }

        /* --- Cart Card --- */
        .cart-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #eee;
        }

        .cart-header {
            padding: 25px 30px;
            font-size: 24px;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-list {
            padding: 0 30px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid #eee;
        }
        .cart-item:last-child { border-bottom: none; }

        /* Custom Checkbox */
        .checkbox-container {
            width: 35px;
            height: 35px;
            border: 2px solid #000;
            border-radius: 6px;
            margin-right: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: #000;
            color: white;
            font-size: 20px;
        }

        .product-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-right: 40px;
        }

        .item-details { flex-grow: 1; }
        .item-name { font-size: 24px; margin: 0 0 5px 0; font-weight: 500; }
        .stock-info { font-size: 14px; color: #666; }
        .stock-bar {
            background: #f0f0f0;
            width: 250px;
            height: 25px;
            border-radius: 5px;
            margin-top: 5px;
            position: relative;
            overflow: hidden;
        }
        .stock-bar-fill {
            width: 100%; height: 100%;
            background: #ffebeb;
            color: var(--accent-red);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .due-date { margin-top: 15px; font-size: 15px; }

        /* Quantity controls on the right */
        .item-right-panel {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
        }

        .qty-selector { display: flex; border: 1px solid #ddd; border-radius: 5px; }
        .qty-btn { width: 35px; height: 35px; border: none; background: white; font-size: 18px; cursor: pointer; color: #ccc; }
        .qty-input { width: 45px; text-align: center; border-left: 1px solid #ddd; border-right: 1px solid #ddd; line-height: 35px; font-size: 15px; }

        /* --- Sticky Footer --- */
        .cart-footer {
            position: fixed;
            bottom: 20px;
            left: 5%;
            right: 5%;
            background: white;
            height: 80px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
        }

        .rent-all-box { display: flex; align-items: center; gap: 15px; font-size: 18px; }
        .checkbox-large {
            width: 40px;
            height: 40px;
            border: 1px solid #333;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-rent-final {
            background: var(--btn-gray);
            border: 1px solid #ccc;
            padding: 12px 60px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <nav>
        <img src="https://via.placeholder.com/50x50?text=Logo" alt="Logo" class="logo">
        <ul class="nav-links">
           <li onclick="window.location.href='Dashboard.html'">Dashboard</li>
           <li onclick="window.location.href='Search.html'">Search</li>
            <li onclick="window.location.href='Rent.html'">Rent</li>
            <li onclick="window.location.href='Team Page.html'">Team Page</li>
        </ul>
        <div class="nav-right">
            <span style="font-size: 24px; color: #bbb;">🔔</span>
            <div class="profile-icon"></div>
        </div>
    </nav>

    <main class="content-wrapper">
        <div class="back-circle">⟨</div>

        <div class="cart-card">
            <div class="cart-header">Category: Computing</div>
            <div class="cart-list">
                
                <div class="cart-item">
                    <div class="checkbox-container">✓</div>
                    <img src="https://via.placeholder.com/100?text=iPhone+13" alt="iPhone 13" class="product-img">
                    <div class="item-details">
                        <h2 class="item-name">iPhone 13</h2>
                        <div class="stock-info">left in stock</div>
                        <div class="stock-bar">
                            <div class="stock-bar-fill">1 out of 1</div>
                        </div>
                        <div class="due-date">Due date:<br>22/02/2026</div>
                    </div>
                    <div class="item-right-panel">
                        <div class="qty-selector">
                            <button class="qty-btn">−</button>
                            <div class="qty-input">1</div>
                            <button class="qty-btn">+</button>
                        </div>
                    </div>
                </div>

                <div class="cart-item">
                    <div class="checkbox-container">✓</div>
                    <img src="https://via.placeholder.com/100?text=iPhone+14" alt="iPhone 14" class="product-img">
                    <div class="item-details">
                        <h2 class="item-name">iPhone 14</h2>
                        <div class="stock-info">left in stock</div>
                        <div class="stock-bar">
                            <div class="stock-bar-fill">1 out of 1</div>
                        </div>
                        <div class="due-date">Due date:<br>22/02/2026</div>
                    </div>
                    <div class="item-right-panel">
                        <div class="qty-selector">
                            <button class="qty-btn">−</button>
                            <div class="qty-input">1</div>
                            <button class="qty-btn">+</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <footer class="cart-footer">
            <div class="rent-all-box">
                <div class="checkbox-large"></div>
                <span>Rent all</span>
            </div>
            <button class="btn-rent-final" onclick="window.location.href='Justification Page.html'">Rent (2)</button>
        </footer>
    </main>

</body>
</html>
