<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT-RENTALS - Product Selection</title>
    <style>
        :root {
            --nav-border: #e0e0e0;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
            --gray-text: #666;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff;
            color: #333;
        }

        /* --- Student Navbar --- */
        nav {
            display: flex;
            align-items: center;
            padding: 10px 40px;
            background-color: white;
            border-bottom: 1px solid var(--nav-border);
            height: 60px;
        }
        .logo { height: 40px; margin-right: 50px; }
        .nav-links { display: flex; list-style: none; margin: 0; padding: 0; flex-grow: 1; gap: 40px; }
        .nav-links li { font-size: 18px; cursor: pointer; color: #333; }
        .nav-links li.active { font-weight: 600; }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .profile-section { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .profile-icon { width: 35px; height: 35px; background: #eee; border-radius: 50%; border: 1px solid #ddd; }

        /* --- Hero Carousel Section --- */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }
        .hero-logo { width: 400px; height: auto; }
        .arrow {
            width: 45px;
            height: 45px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ccc;
            font-size: 24px;
            position: absolute;
        }
        .arrow-left { left: 10%; }
        .arrow-right { right: 10%; }

        .carousel-indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: -20px;
            margin-bottom: 40px;
        }
        .indicator { width: 45px; height: 8px; background: #eee; border-radius: 4px; }
        .indicator.active { background: #d9d9d9; }

        /* --- Shopping Cart UI --- */
        .cart-status {
            position: absolute;
            right: 40px;
            top: 80px;
            text-align: center;
        }
        .cart-circle {
            width: 50px;
            height: 50px;
            background: #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 5px;
            cursor: pointer;
        }

        /* --- Category Section --- */
        .category-container {
            padding: 20px 5%;
        }
        .category-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 30px;
            font-style: italic;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: 15px;
            padding: 20px;
            text-align: left;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-5px); }

        .product-img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            margin-bottom: 15px;
        }
        .product-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .stock-label { color: var(--gray-text); font-size: 14px; }

    </style>
</head>
<body>

    <nav>
        <img src="https://via.placeholder.com/50x50?text=Logo" alt="ICT Logo" class="logo">
        <ul class="nav-links">
            <li onclick="window.location.href='Dashboard.html'">Dashboard</li>
            <li onclick="window.location.href='Search.html'">Search</li>
            <li class="active" onclick="window.location.href='Rent.html'">Rent</li>
            <li onclick="window.location.href='Team Page.html'">Team Page</li>
        </ul>
        <div class="nav-right">
            <span style="font-size: 24px; color: #bbb; cursor: pointer;">🔔</span>
            <div class="profile-section">
                <div class="profile-icon"></div>
                <span style="color: #bbb; font-size: 12px;">▼</span>
            </div>
        </div>
    </nav>

    <div class="cart-status" onclick="location.href='Cart Page.html'" style="cursor: pointer; z-index: 999;">
    <div class="cart-circle" style="pointer-events: none;">🛒</div>
    <div style="font-size: 14px; font-weight: 500;">In cart: 4</div>
    </div>

    <div class="hero-section">
        <div class="arrow arrow-left">⟨</div>
        <img src="https://via.placeholder.com/400x120?text=ICT+-+RENTALS" alt="Rental Banner" class="hero-logo">
        <div class="arrow arrow-right">⟩</div>
    </div>

    <div class="carousel-indicators">
        <div class="indicator active"></div>
        <div class="indicator"></div>
        <div class="indicator"></div>
        <div class="indicator"></div>
        <div class="indicator"></div>
    </div>

    <div class="category-container">
        <h2 class="category-title">“Computing”</h2>
        
        <div class="product-grid">
            <div class="product-card" onclick="location.href='Product Page.html'">
                <img src="https://via.placeholder.com/150x150?text=iPhone+13" alt="iPhone 13" class="product-img">
                <div class="product-name">iPhone 13</div>
                <div class="stock-label">Left in stock: 1</div>
            </div>

            <div class="product-card" onclick="location.href='Product Page.html'">
                <img src="https://via.placeholder.com/150x150?text=iPhone+14" alt="iPhone 14" class="product-img">
                <div class="product-name">iPhone 14</div>
                <div class="stock-label">Left in stock: 1</div>
            </div>

            <div class="product-card" onclick="location.href='Product Page.html'">
                <img src="https://via.placeholder.com/150x150?text=iPhone+15" alt="iPhone 15" class="product-img">
                <div class="product-name">iPhone 15</div>
                <div class="stock-label">Left in stock: 1</div>
            </div>

            <div class="product-card" onclick="location.href='Product Page.html'">
                <img src="https://via.placeholder.com/150x150?text=iPhone+16" alt="iPhone 16" class="product-img">
                <div class="product-name">iPhone 16</div>
                <div class="stock-label">Left in stock: 1</div>
            </div>

            <div class="product-card" onclick="location.href='Product Page.html'">
                <img src="https://via.placeholder.com/150x150?text=iPhone+17" alt="iPhone 17" class="product-img">
                <div class="product-name">iPhone 17</div>
                <div class="stock-label">Left in stock: 1</div>
            </div>
        </div>
    </div>

</body>
</html>
