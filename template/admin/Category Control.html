<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT-RENTALS - Category List</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
        }

        /* --- Global Navbar (Consistent with Admin System) --- */
        nav {
            display: flex;
            align-items: center;
            padding: 10px 40px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #fcfcfc;
        }
        .logo { height: 45px; margin-right: 40px; }
        .nav-links { display: flex; list-style: none; margin: 0; padding: 0; flex-grow: 1; }
        .nav-links li { margin: 0 20px; font-size: 18px; cursor: pointer; }
        .nav-links li.active { font-weight: 500; background-color: #f8f8f8; padding: 10px 15px; margin: -10px 5px; }
        .dropdown::after { content: ' ▼'; font-size: 10px; color: #888; }
        .nav-links li.active {
            font-weight: 600;
        }                
        .nav-right { display: flex; align-items: center; gap: 20px; color: #333; }

        /* --- Content Container --- */
        .container {
            padding: 50px 10%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 25px;
        }

        h1 { font-size: 28px; margin: 0 0 10px 0; }

        .pagination-controls {
            color: #666;
            font-size: 18px;
            display: flex;
            align-items: center;
        }

        .custom-select {
            padding: 4px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin: 0 8px;
            font-size: 16px;
            color: #555;
            background: #fff;
        }

        .btn-add-category {
            background-color: #d9d9d9;
            color: #888;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- Category Table --- */
        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #ddd;
        }

        th {
            background-color: #efefef;
            padding: 15px;
            text-align: center;
            color: #777;
            font-size: 14px;
            border: 1px solid #ddd;
            font-weight: 600;
        }

        td {
            padding: 15px;
            border: 1px solid #ddd;
            color: #666;
            text-align: center;
            vertical-align: middle;
            font-size: 15px;
        }

        .text-left { text-align: left; padding-left: 30px; }

        /* --- Toggle Switch --- */
        .switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 28px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #999;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #888; }
        input:checked + .slider:before { transform: translateX(26px); }

        /* --- Action Buttons --- */
        .action-icon {
            background: none;
            border: none;
            font-size: 22px;
            color: #aaa;
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
        }

        .action-icon:hover { color: #666; }
    </style>
</head>
<body>

    <nav>
        <img src="https://via.placeholder.com/50x50?text=Logo" alt="Logo" class="logo">
        <ul class="nav-links">
            <li onclick="window.location.href='Dashboard Admin.html'">Dashboard</li>
            <li class="dropdown">Management</li>
            <li onclick="window.location.href='Penalty Page.html'">Penalty Page</li>
             <li onclick="window.location.href='Team Page Admin.html'">Team Page</li> 
        </ul>
        <div class="nav-right">
            <div class="nav-right"onclick ="window.location.href='../Login Choice.html'">
            <span style="font-size: 24px; color: #bbb;">🔔</span>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <div>
                <h1>Category List</h1>
                <div class="pagination-controls">
                    Show 
                    <select class="custom-select">
                        <option>3</option>
                        <option>10</option>
                    </select>
                    Product
                </div>
            </div>
            <button class="btn-add-category" onclick="window.location.href='Add Category.html'">Add category</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th width="8%">No.</th>
                    <th width="50%">Category</th>
                    <th width="14%">Visible</th>
                    <th width="14%">Modify</th>
                    <th width="14%">Delete</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td class="text-left">Computing</td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td><button class="action-icon" onclick="window.location.href='Edit Category.html'">📝</button></td>
                    <td><button class="action-icon">🗑️</button></td>
                </tr>
                <tr>
                    <td>2</td>
                    <td class="text-left">Production</td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td><button class="action-icon" onclick="window.location.href='Edit Category.html'">📝</button></td>
                    <td><button class="action-icon">🗑️</button></td>
                </tr>
                <tr>
                    <td>3</td>
                    <td class="text-left">Audio</td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </td>
                    <td><button class="action-icon" onclick="window.location.href='Edit Category.html'">📝</button></td>
                    <td><button class="action-icon">🗑️</button></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
