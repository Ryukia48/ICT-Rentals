<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT-RENTALS - Add Brand</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --nav-bg: #ffffff;
            --border-color: #e0e0e0;
            --text-main: #333333;
            --btn-gray: #d9d9d9;
            --accent-blue: #2b4593;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* --- Navbar --- */
        nav {
            display: flex;
            align-items: center;
            padding: 10px 40px;
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--border-color);
            height: 60px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            margin-right: 40px;
        }

        .logo-placeholder {
            width: 45px;
            height: 45px;
            background: #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 1px solid var(--accent-blue);
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            flex-grow: 1;
        }

        .nav-links li {
            margin: 0 20px;
            font-size: 16px;
            cursor: pointer;
            color: #555;
        }

        .nav-links li.active {
            font-weight: 600;
            background: #f0f0f0;
            padding: 10px 15px;
            margin: -10px 5px;
        }

        .dropdown::after {
            content: ' ▼';
            font-size: 10px;
            color: #888;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        /* --- Main Content --- */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            position: relative;
            padding: 0 20px;
        }

        .back-btn {
            position: absolute;
            left: -30px;
            top: 0;
            width: 45px;
            height: 45px;
            background: #efefef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            color: #999;
            font-size: 20px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
        }

        /* --- Form Card --- */
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 50px 80px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .form-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
        }

        .form-row label {
            width: 160px;
            font-size: 18px;
            padding-top: 8px;
        }

        .form-row input[type="text"] {
            flex-grow: 1;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 18px;
            outline: none;
        }

        .image-preview {
            width: 160px;
            height: 130px;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .image-preview img {
            max-width: 80%;
            height: auto;
        }

        /* --- Actions --- */
        .footer-row {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 50px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 18px;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 55px;
            height: 28px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #999;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #888; }
        input:checked + .slider:before { transform: translateX(26px); }

        .btn-save {
            background-color: var(--btn-gray);
            border: none;
            padding: 10px 50px;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            color: #333;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-section">
            <div class="logo-placeholder">ICT Logo</div>
        </div>
        <ul class="nav-links">
           <li onclick="window.location.href='Dashboard Admin.html'">Dashboard</li>
            <li class="dropdown">Management</li>
            <li onclick="window.location.href='Penalty Page.html'">Penalty Page</li>
             <li onclick="window.location.href='Team Page Admin.html'">Team Page</li> 
        </ul>
        <div class="nav-right"onclick ="window.location.href='../Login Choice.html'">
            <span>Log Out</span>
            <span style="font-size: 22px; color: #ccc;">🔔</span>
        </div>
    </nav>

    <div class="container">
        <button class="back-btn">❮</button>
        <h1>Add Brand</h1>

        <div class="form-card">
            <div class="form-row">
                <label>Brand name :</label>
                <input type="text" value="Apple">
            </div>

            <div class="form-row">
                <label>Banner picture :</label>
                <div class="image-preview">
                    <img src="https://via.placeholder.com/100x100?text=Logo" alt="Brand Logo">
                </div>
            </div>

            <div class="footer-row">
                <div class="toggle-container">
                    <span>Open visible :</span>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
                <button class="btn-save" onclick="window.location.href='Brand Control.html'">Save</button>
            </div>
        </div>
    </div>

</body>
</html>
