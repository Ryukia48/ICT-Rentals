<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT-RENTALS Login</title>
    <style>
        /* Base styles to match 1920x1080 aspect */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The white card container */
        .login-card {
            background-color: #ffffff;
            width: 450px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* Header Logo Section */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background-color: #1a3a8a; /* Dark blue from logo */
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: inline-block;
            margin-right: 10px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: bold;
            color: #1a3a8a;
        }

        .logo-text span {
            color: #5c78b5;
            font-weight: 300;
            margin-left: 5px;
        }

        hr {
            border: 0;
            border-top: 1px solid #ddd;
            margin: 25px 0;
        }

        h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-mahidol {
            background-color: #7d97e2;
            color: white;
        }

        .btn-admin {
            background-color: #ffecd1;
            color: #8a7a60;
        }

        .icon {
            margin-right: 10px;
            font-size: 18px;
        }

        /* Footer Section */
        .footer-text h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }

        .footer-text p {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            margin: 5px 0;
        }

        .blue-link {
            color: #3a7ebf;
            text-decoration: none;
            font-weight: bold;
        }

        .example-text {
            font-weight: normal;
        }

        /* GEMINI HELPER */
        .gemini-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #4285f4, #9b72cb);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            font-weight: bold;
            z-index: 1000;
            transition: transform 0.2s;
        }

        .gemini-btn:hover {
            transform: scale(1.05);
        }

        .gemini-icon {
            margin-right: 8px;
            font-size: 18px;
        }
        .ai-modal {
            position: fixed;
            bottom: 80px;
            left: 20px;
            width: 350px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            z-index: 1001;
        }

        .ai-header {
            background: #1a3a8a; /* Matches your logo blue */
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .ai-content {
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }

        .ai-footer {
            padding: 10px;
            border-top: 1px solid #eee;
            display: flex;
        }

        #ai-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }

        .ai-footer button {
            background: #7d97e2;
            color: white;
            border: none;
            padding: 8px 15px;
            margin-left: 5px;
            border-radius: 4px;
            cursor: pointer;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        /* GEMINI HELPER */
    </style>
</head>
<body>
    <main>
        <div class="login-card">
            <div class="logo-container">
                <div class="logo-icon"></div>
                <div class="logo-text">ICT<span>- RENTALS</span></div>
            </div>

            <hr>

            <h2>Log in using your account on:</h2>

            <a href="login-student" class="btn btn-mahidol">
                <span class="icon">👤</span> Mahidol Account Login
            </a>

            <a href="login-admin" class="btn btn-admin">
                Admin Account Login
            </a>

            <hr>

            <div class="footer-text">
                <h3>Is this your first time here?</h3>
                <p><a href="#" class="blue-link">Use your MU internet account for login</a></p>
                <p class="example-text">
                    <strong>Ex.</strong> u6388xxx (for student),<br>
                    pxxxx.xxx (for teacher)
                </p>
            </div>
        </div>  
    </main>
    
    <!-- GEMINI HELPER -->
    <footer>
        <button class="gemini-btn" onclick="toggleAI()">
            <span class="gemini-icon">✨</span> Ask Gemini
        </button>

        <div id="ai-window" class="ai-modal" style="display: none;">
            <div class="ai-header">
                <span>✨ Gemini Assistant</span>
                <button onclick="toggleAI()" class="close-btn">&times;</button>
            </div>
            <div id="ai-response-area" class="ai-content">
                Hi! How can I help you navigate ICT-RENTALS?
            </div>
            <div class="ai-footer">
                <input type="text" id="ai-input" placeholder="Type your question...">
                <button onclick="sendToAI()">Send</button>
            </div>
        </div>
    </footer>
    

    <script>
        function toggleAI() {
            const win = document.getElementById('ai-window');
            win.style.display = win.style.display === 'none' ? 'flex' : 'none';
        }

        async function sendToAI() {
            const input = document.getElementById('ai-input');
            const area = document.getElementById('ai-response-area');
            const prompt = input.value;
            if (!prompt) return;

            area.innerHTML = "<em>Thinking...</em>";
            input.value = ""; // Clear input

            try {
                const response = await fetch('/api/ai-assist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: `[Context: ${window.location.pathname}] ${prompt}` }),
                });
                
                const data = await response.json();
                area.innerHTML = data.success ? data.text : "Error: " + data.error;
            } catch (err) {
                area.innerHTML = "Failed to connect to AI.";
            }
        }
    </script>
    <!-- GEMINI HELPER -->
</body>
</html>
