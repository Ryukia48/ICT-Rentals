<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT-RENTALS - Cart</title>
    <style>
        :root {
            --border-color: #d0d0d0;
            --bg-light: #f9f9f9;
            --accent-red: #ff4d4d;
            --btn-gray: #e8e8e8;
            --text-main: #333;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Navigation Bar --- */
        nav {
            display: flex;
            align-items: center;
            padding: 0 40px;
            background-color: white;
            border-bottom: 1px solid var(--border-color);
            height: 70px;
        }
        .logo { height: 45px; margin-right: 50px; }
        .nav-links { display: flex; list-style: none; margin: 0; padding: 0; flex-grow: 1; gap: 45px; }
        .nav-links li { font-size: 18px; cursor: pointer; color: #333; }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .profile-icon { width: 40px; height: 40px; background: #eee; border-radius: 50%; border: 1px solid #ddd; }

        /* --- Main Content --- */
        .content-wrapper {
            flex-grow: 1;
            padding: 20px 8%;
            position: relative;
            padding-bottom: 100px; /* Space for sticky footer */
        }
        .nav-links li.active { font-weight: 600; }
        .nav-links a {
            text-decoration: none;
            color: #333;
        }        

        .back-circle {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 20px;
            color: #ccc;
        }

        /* --- Cart Card --- */
        .cart-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #eee;
        }

        .cart-header {
            padding: 25px 30px;
            font-size: 24px;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-list {
            padding: 0 30px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid #eee;
        }
        .cart-item:last-child { border-bottom: none; }

        /* Custom Checkbox */
        .checkbox-container {
            width: 35px;
            height: 35px;
            border: 2px solid #000;
            border-radius: 6px;
            margin-right: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: #000;
            color: white;
            font-size: 20px;
        }

        .product-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-right: 40px;
        }

        .item-details { flex-grow: 1; }
        .item-name { font-size: 24px; margin: 0 0 5px 0; font-weight: 500; }
        .stock-info { font-size: 14px; color: #666; }
        .stock-bar {
            background: #f0f0f0;
            width: 250px;
            height: 25px;
            border-radius: 5px;
            margin-top: 5px;
            position: relative;
            overflow: hidden;
        }
        .stock-bar-fill {
            width: 100%; height: 100%;
            background: #ffebeb;
            color: var(--accent-red);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .due-date { margin-top: 15px; font-size: 15px; }

        /* Quantity controls on the right */
        .item-right-panel {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 20px;
        }

        .qty-selector { display: flex; border: 1px solid #ddd; border-radius: 5px; }
        .qty-btn { width: 35px; height: 35px; border: none; background: white; font-size: 18px; cursor: pointer; color: #ccc; }
        .qty-input { width: 45px; text-align: center; border-left: 1px solid #ddd; border-right: 1px solid #ddd; line-height: 35px; font-size: 15px; }

        /* --- Sticky Footer --- */
        .cart-footer {
            position: fixed;
            bottom: 20px;
            left: 5%;
            right: 5%;
            background: white;
            height: 80px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
        }

        .rent-all-box { display: flex; align-items: center; gap: 15px; font-size: 18px; }
        .checkbox-large {
            width: 40px;
            height: 40px;
            border: 1px solid #333;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-rent-final {
            background: var(--btn-gray);
            border: 1px solid #ccc;
            padding: 12px 60px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
        }
        /* GEMINI HELPER */
        .gemini-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #4285f4, #9b72cb);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            font-weight: bold;
            z-index: 1000;
            transition: transform 0.2s;
        }

        .gemini-btn:hover {
            transform: scale(1.05);
        }

        .gemini-icon {
            margin-right: 8px;
            font-size: 18px;
        }
        .ai-modal {
            position: fixed;
            bottom: 80px;
            left: 20px;
            width: 350px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            z-index: 1001;
        }

        .ai-header {
            background: #1a3a8a; /* Matches your logo blue */
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .ai-content {
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }

        .ai-footer {
            padding: 10px;
            border-top: 1px solid #eee;
            display: flex;
        }

        #ai-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }

        .ai-footer button {
            background: #7d97e2;
            color: white;
            border: none;
            padding: 8px 15px;
            margin-left: 5px;
            border-radius: 4px;
            cursor: pointer;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        /* GEMINI HELPER */
    </style>
</head>
<body>

    <nav>
        <img src="https://i.postimg.cc/N0Y1nx0g/mu-ict-logo.png" alt="Logo" class="logo">
        <ul class="nav-links">
            <li><a href="/student/dashboard">Dashboard</a></li>
            <li><a href="/student/search">Search</a></li>
            <li><a href="/student/rent">Rent</a></li>
            <li><a href="/student/team">Team Page</a></li>
        </ul>
        <div class="nav-right">
            <img src="https://i.postimg.cc/sgJMCVtT/Doorbell.png" style="height: 25px; cursor: pointer; margin-left: 15px;">
            
            <div class="profile-nav-wrapper" style="position: relative; display: flex; align-items: center; margin-left: 15px;">
                
                <div style="width: 35px; height: 35px; background-color: #e0e0e0; border-radius: 50%; border: 1px solid #ccc; overflow: hidden; display: flex; align-items: flex-end; justify-content: center;">
                    <img src="https://i.postimg.cc/wjsC2LfL/Male-User.png" style="width: 35px; height: 30px">
                </div>
                <span class="dropdown-arrow" onclick="toggleDropdown()" style="cursor: pointer; margin-left: 8px; color: #666; font-size: 12px; transition: 0.2s;">▼</span>

                <div id="profile-dropdown" style="display: none; position: absolute; top: 45px; right: 0; background: white; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; min-width: 140px; padding: 5px 0;">
                    <a href="/student/profile" style="display: block; padding: 10px 20px; color: #333; text-decoration: none; font-size: 14px; transition: background 0.2s;">Profile</a>
                    <a href="/" style="display: block; padding: 10px 20px; color: #d9534f; text-decoration: none; font-size: 14px; transition: background 0.2s; border-top: 1px solid #eee;">Log Out</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="content-wrapper">
        <div class="back-circle">⟨</div>

        <div class="cart-card">
            <div class="cart-header">Category: Computing</div>
            <div class="cart-list">
                
                <div class="cart-item">
                    <div class="checkbox-container">✓</div>
                    <img src="https://i.postimg.cc/1RdLw8Wq/Iphone13.png" alt="iPhone 13" class="product-img">
                    <div class="item-details">
                        <h2 class="item-name">iPhone 13</h2>
                        <div class="stock-info">left in stock</div>
                        <div class="stock-bar">
                            <div class="stock-bar-fill">1 out of 1</div>
                        </div>
                        <div class="due-date">Due date:<br>22/02/2026</div>
                    </div>
                    <div class="item-right-panel">
                        <div class="qty-selector">
                            <button class="qty-btn">−</button>
                            <div class="qty-input">1</div>
                            <button class="qty-btn">+</button>
                        </div>
                    </div>
                </div>

                <div class="cart-item">
                    <div class="checkbox-container">✓</div>
                    <img src="https://i.postimg.cc/Vsh3nJ7r/Iphone14.png" alt="iPhone 14" class="product-img">
                    <div class="item-details">
                        <h2 class="item-name">iPhone 14</h2>
                        <div class="stock-info">left in stock</div>
                        <div class="stock-bar">
                            <div class="stock-bar-fill">1 out of 1</div>
                        </div>
                        <div class="due-date">Due date:<br>22/02/2026</div>
                    </div>
                    <div class="item-right-panel">
                        <div class="qty-selector">
                            <button class="qty-btn">−</button>
                            <div class="qty-input">1</div>
                            <button class="qty-btn">+</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <footer class="cart-footer">
            <div class="rent-all-box">
                <div class="checkbox-large"></div>
                <span>Rent all</span>
            </div>
            <button class="btn-rent-final" onclick="window.location.href='Justification Page.html'">Rent (2)</button>
        </footer>
    </main>
    <!-- GEMINI HELPER -->
    <footer>
        <button class="gemini-btn" onclick="toggleAI()">
            <span class="gemini-icon">✨</span> Ask Gemini
        </button>

        <div id="ai-window" class="ai-modal" style="display: none;">
            <div class="ai-header">
                <span>✨ Gemini Assistant</span>
                <button onclick="toggleAI()" class="close-btn">&times;</button>
            </div>
            <div id="ai-response-area" class="ai-content">
                Hi! How can I help you navigate ICT-RENTALS?
            </div>
            <div class="ai-footer">
                <input type="text" id="ai-input" placeholder="Type your question...">
                <button onclick="sendToAI()">Send</button>
            </div>
        </div>
    </footer>


    <script>
        function toggleAI() {
            const win = document.getElementById('ai-window');
            win.style.display = win.style.display === 'none' ? 'flex' : 'none';
        }

        async function sendToAI() {
            const input = document.getElementById('ai-input');
            const area = document.getElementById('ai-response-area');
            const prompt = input.value;
            if (!prompt) return;

            area.innerHTML = "<em>Thinking...</em>";
            input.value = ""; // Clear input

            try {
                const response = await fetch('/api/ai-assist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: `[Context: ${window.location.pathname}] ${prompt}` }),
                });
                
                const data = await response.json();
                area.innerHTML = data.success ? data.text : "Error: " + data.error;
            } catch (err) {
                area.innerHTML = "Failed to connect to AI.";
            }
        }
        function toggleDropdown() {
            const dropdown = document.getElementById('profile-dropdown');
            const arrow = document.querySelector('.dropdown-arrow');
            
            if (dropdown.style.display === 'none') {
                dropdown.style.display = 'block';
                arrow.textContent = '▲';
            } else {
                dropdown.style.display = 'none';
                arrow.textContent = '▼';
            }
        }

        // Close dropdown if user clicks anywhere else on the screen
        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-arrow')) {
                const dropdown = document.getElementById('profile-dropdown');
                const arrow = document.querySelector('.dropdown-arrow');
                if (dropdown.style.display === 'block') {
                    dropdown.style.display = 'none';
                    arrow.textContent = '▼';
                }
            }
        }
    </script>
</body>
</html>
