<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT-RENTALS - Search Filter</title>
    <style>
        :root {
            --label-bg: #e0e0e0;
            --btn-search: #d9d9d9;
            --btn-clear: #f0f0f0;
            --border-color: #ccc;
            --nav-border: #e0e0e0;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff;
            color: #333;
        }

        /* --- Student Navbar --- */
        nav {
            display: flex;
            align-items: center;
            padding: 10px 40px;
            background-color: white;
            border-bottom: 1px solid var(--nav-border);
            height: 60px;
        }

        .logo { height: 45px; margin-right: 50px; }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            flex-grow: 1;
            gap: 50px;
        }

        .nav-links li {
            font-size: 18px;
            cursor: pointer;
            color: #333;
        }

        .nav-links li.active { font-weight: 600; }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-icon {
            width: 35px;
            height: 35px;
            background: #eee;
            border-radius: 50%;
            border: 1px solid #ddd;
        }

        /* --- Search Filter Form --- */
        .filter-container {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            gap: 20px;
        }

        .label-block {
            background-color: var(--label-bg);
            width: 180px;
            padding: 12px 20px;
            font-size: 20px;
            font-weight: 500;
            box-sizing: border-box;
        }

        .input-field {
            flex-grow: 1;
            padding: 10px;
            font-size: 18px;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            outline: none;
        }

        /* Styled Dropdown for Status */
        select.input-field {
            border-radius: 20px; /* Matching the rounded dropdown in design */
            appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,<svg%20xmlns="http://www.w3.org/2000/svg"%20width="14"%20height="14"%20viewBox="0%200%2024%2024" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline%20points="6%209%2012%2015%2018%209"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 20px center;
            padding-right: 40px;
        }

        /* --- Buttons --- */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .btn {
            width: 160px;
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-search { background-color: var(--btn-search); color: #333; }
        .btn-clear { background-color: var(--btn-clear); color: #333; }
        .btn:hover { opacity: 0.8; }

        /* Floating Help Button */
        .help-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background-color: #d9d9d9;
            color: #666;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        /* GEMINI HELPER */
        .gemini-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #4285f4, #9b72cb);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            font-weight: bold;
            z-index: 1000;
            transition: transform 0.2s;
        }

        .gemini-btn:hover {
            transform: scale(1.05);
        }

        .gemini-icon {
            margin-right: 8px;
            font-size: 18px;
        }
        .ai-modal {
            position: fixed;
            bottom: 80px;
            left: 20px;
            width: 350px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            z-index: 1001;
        }

        .ai-header {
            background: #1a3a8a; /* Matches your logo blue */
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .ai-content {
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }

        .ai-footer {
            padding: 10px;
            border-top: 1px solid #eee;
            display: flex;
        }

        #ai-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }

        .ai-footer button {
            background: #7d97e2;
            color: white;
            border: none;
            padding: 8px 15px;
            margin-left: 5px;
            border-radius: 4px;
            cursor: pointer;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        /* GEMINI HELPER */
    </style>
</head>
<body>

    <nav>
        <img src="https://i.postimg.cc/N0Y1nx0g/mu-ict-logo.png" alt="Logo" class="logo">
        <ul class="nav-links">
            <li><a href="/student/dashboard">Dashboard</a></li>
            <li><a href="/student/search">Search</a></li>
            <li><a href="/student/rent">Rent</a></li>
            <li><a href="/student/team">Team Page</a></li>
        </ul>
        <div class="nav-right">
            <span style="font-size: 24px; color: #999; cursor: pointer;">🔔</span>
            
            <div class="profile-nav-wrapper" style="position: relative; display: flex; align-items: center; margin-left: 15px;">
                
                <div class="profile-circle" style="width: 35px; height: 35px; background-color: #e0e0e0; border-radius: 50%; border: 1px solid #ccc;"></div>
                
                <span class="dropdown-arrow" onclick="toggleDropdown()" style="cursor: pointer; margin-left: 8px; color: #666; font-size: 12px; transition: 0.2s;">▼</span>

                <div id="profile-dropdown" style="display: none; position: absolute; top: 45px; right: 0; background: white; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; min-width: 140px; padding: 5px 0;">
                    <a href="/student/profile" style="display: block; padding: 10px 20px; color: #333; text-decoration: none; font-size: 14px; transition: background 0.2s;">Profile</a>
                    <a href="/" style="display: block; padding: 10px 20px; color: #d9534f; text-decoration: none; font-size: 14px; transition: background 0.2s; border-top: 1px solid #eee;">Log Out</a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="filter-container">
            <div class="form-row">
                <div class="label-block">Category</div>
                <input type="text" class="input-field">
            </div>

            <div class="form-row">
                <div class="label-block">Brand</div>
                <input type="text" class="input-field">
            </div>

            <div class="form-row">
                <div class="label-block">Name</div>
                <input type="text" class="input-field">
            </div>

            <div class="form-row">
                <div class="label-block">Status</div>
                <select class="input-field">
                    <option value=""></option>
                    <option value="available">Available</option>
                    <option value="rented">Rented</option>
                    <option value="maintenance">Maintenance</option>
                </select>
            </div>

            <div class="button-group">
                <button class="btn btn-search" onclick="window.location.href='Search Result.html'">Search</button>
                <button class="btn btn-clear">Clear</button>
            </div>
        </div>
    </main>


    <!-- GEMINI HELPER -->
    <footer>
        <button class="gemini-btn" onclick="toggleAI()">
            <span class="gemini-icon">✨</span> Ask Gemini
        </button>

        <div id="ai-window" class="ai-modal" style="display: none;">
            <div class="ai-header">
                <span>✨ Gemini Assistant</span>
                <button onclick="toggleAI()" class="close-btn">&times;</button>
            </div>
            <div id="ai-response-area" class="ai-content">
                Hi! How can I help you navigate ICT-RENTALS?
            </div>
            <div class="ai-footer">
                <input type="text" id="ai-input" placeholder="Type your question...">
                <button onclick="sendToAI()">Send</button>
            </div>
        </div>
    </footer>


    <script>
        function toggleAI() {
            const win = document.getElementById('ai-window');
            win.style.display = win.style.display === 'none' ? 'flex' : 'none';
        }

        async function sendToAI() {
            const input = document.getElementById('ai-input');
            const area = document.getElementById('ai-response-area');
            const prompt = input.value;
            if (!prompt) return;

            area.innerHTML = "<em>Thinking...</em>";
            input.value = ""; // Clear input

            try {
                const response = await fetch('/api/ai-assist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: `[Context: ${window.location.pathname}] ${prompt}` }),
                });
                
                const data = await response.json();
                area.innerHTML = data.success ? data.text : "Error: " + data.error;
            } catch (err) {
                area.innerHTML = "Failed to connect to AI.";
            }
        }
        function toggleDropdown() {
            const dropdown = document.getElementById('profile-dropdown');
            const arrow = document.querySelector('.dropdown-arrow');
            
            if (dropdown.style.display === 'none') {
                dropdown.style.display = 'block';
                arrow.textContent = '▲';
            } else {
                dropdown.style.display = 'none';
                arrow.textContent = '▼';
            }
        }

        // Close dropdown if user clicks anywhere else on the screen
        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-arrow')) {
                const dropdown = document.getElementById('profile-dropdown');
                const arrow = document.querySelector('.dropdown-arrow');
                if (dropdown.style.display === 'block') {
                    dropdown.style.display = 'none';
                    arrow.textContent = '▼';
                }
            }
        }
    </script>
</body>
</html>
